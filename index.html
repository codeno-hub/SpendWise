<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SpendWise</title>

  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>

<body>
  <div class="app">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__logo">
        <div class="logo-mark">Spend<em>Wise</em></div>
      </div>

      <nav class="sidebar__nav">
        <button class="nav-item active" data-nav="dashboard">Dashboard</button>
        <button class="nav-item" data-nav="transactions">Transactions</button>
        <button class="nav-item" data-nav="categories">Categories</button>
      </nav>
    </aside>

    <!-- Main -->
    <div class="main">

      <header class="topbar">
        <button id="sidebar-toggle">☰</button>
        <h1>Dashboard</h1>
      </header>

      <div class="content">

        <!-- DASHBOARD -->
        <div data-section="dashboard">
          <div class="tabs">
            <button class="tab-btn active" data-tab="income">Income</button>
            <button class="tab-btn" data-tab="expense">Expense</button>
            <button class="tab-btn" data-tab="savings">Savings</button>
          </div>

          <div id="tab-income" class="tab-panel">
            <input id="inc-name" data-action="add-income" placeholder="Source" />
            <input id="inc-amount" data-action="add-income" type="number" placeholder="Amount" />
            <button data-action="add-income">Add Income</button>
          </div>

          <div id="tab-expense" class="tab-panel hidden">
            <input id="exp-desc" data-action="add-expense" placeholder="Description" />
            <input id="exp-amount" data-action="add-expense" type="number" placeholder="Amount" />
            <button data-action="add-expense">Add Expense</button>
          </div>

          <div id="tab-savings" class="tab-panel hidden">
            <input id="sav-name" data-action="add-savings" placeholder="Goal" />
            <input id="sav-amount" data-action="add-savings" type="number" placeholder="Amount" />
            <button data-action="add-savings">Add Savings</button>
          </div>
        </div>

        <!-- TRANSACTIONS -->
        <div data-section="transactions" class="hidden">
          <h2>Transactions</h2>
          <p>No transactions yet 👀</p>
        </div>

        <!-- CATEGORIES -->
        <div data-section="categories" class="hidden">
          <h2>Categories</h2>
          <p>Manage your categories here</p>
        </div>

      </div>
    </div>

  </div>

  <div id="toast" class="toast"></div>

  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
